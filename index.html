<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="app-header">
            <div class="status-dot"></div>
            <span id="current-space-name">Main</span>
        </header>

        <div class="balance-hero">
            <h3>Your Balance</h3>
            <h1 id="balance" class="balance">$0.00</h1>
        </div>

        <div class="inc-exp-container">
            <div>
                <h4>Income</h4>
                <p id="money-plus" class="money plus">+$0.00</p>
            </div>
            <div>
                <h4>Expense</h4>
                <p id="money-minus" class="money minus">-$0.00</p>
            </div>
        </div>

        <h3>History</h3>
        <div class="search-container">
            <input type="text" id="search" placeholder="Search transactions..." autocomplete="off" />
        </div>
        <ul id="list" class="list"></ul>

        <h3>Add New Transaction</h3>
        <form id="form">
            <div class="form-control">
                <label for="text">Description</label>
                <input type="text" id="text" placeholder="e.g., Sales, Expences..." required />
            </div>
            <div class="form-control">
                <label for="amount">Amount <br /> (negative = expense, positive = income)</label>
                <input type="number" step="0.01" id="amount" placeholder="Enter amount..." required />
            </div>
        <br>
            <button class="btn">Add Transaction</button>
        </form>
<br><br><br>
        <div class="space-management">
            <h3>Space Management</h3>
            <div class="space-actions">
                <button class="btn btn-ghost" id="edit-space-btn">Edit Space Name</button>
                <button class="btn btn-danger-ghost" id="delete-space-btn">Delete This Space</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-icon-btn" id="settings-btn" title="Settings">⚙️</button>
        <div class="spaces-container" id="spaces-list">
            <!-- Spaces will be injected here -->
        </div>
        <button class="add-space-btn" id="add-space-btn" title="Add Tracking Space">+</button>
    </nav>

    <!-- Modal Overlay -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h3>New Tracking Space</h3>
            <form id="space-form">
                <div class="form-control">
                    <label for="space-name">Space Name</label>
                    <input type="text" id="space-name" placeholder="e.g., Business, Savings..." required />
                </div>
                <div class="form-control">
                    <label for="space-desc">Description (Optional)</label>
                    <input type="text" id="space-desc" placeholder="What is this space for?" />
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-ghost" id="close-modal">Cancel</button>
                    <button type="submit" class="btn">Create Space</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-overlay">
        <div class="modal">
            <h3>Settings</h3>
            <form id="settings-form">
                <div class="form-control">
                    <label for="currency-select">Currency</label>
                    <select id="currency-select">
                        <option value="USD">USD ($)</option>
                        <option value="EUR">EUR (€)</option>
                        <option value="GBP">GBP (£)</option>
                        <option value="JPY">JPY (¥)</option>
                        <option value="INR">INR (₹)</option>
                    </select>
                </div>
                <div class="form-control">
                    <label for="theme-select">Theme</label>
                    <select id="theme-select">
                        <option value="dark">Dark Mode</option>
                        <option value="light">Light Mode</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-danger" id="clear-data">Clear All Data</button>
                    <button type="submit" class="btn">Save Settings</button>
                </div>
            </form>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
