<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="app-header">
            <div class="status-dot"></div>
            <span id="current-space-name">Main</span>
            <button id="transfer-trigger" class="nav-icon-btn" title="Transfer Funds" style="position: absolute; right: 0; display: none;">⇄</button>
        </header>

        <div class="balance-hero">
            <h3>Your Balance</h3>
            <h1 id="balance" class="balance">$0.00</h1>
        </div>

        <div class="inc-exp-container">
            <div>
                <h4>Income</h4>
                <p id="money-plus" class="money plus">+$0.00</p>
            </div>
            <div>
                <h4>Expense</h4>
                <p id="money-minus" class="money minus">-$0.00</p>
            </div>
        </div>
        <div style="display: flex; gap: 12px; margin-top: -10px; margin-bottom: 20px;">
            <button id="view-analytics" class="btn btn-ghost" style="flex: 1;">Analytics</button>
            <button id="open-add-transaction" class="btn" style="flex: 1;">Add Transaction</button>
        </div>

        <h3>History</h3>
        <div class="search-container">
            <input type="text" id="search" placeholder="Search transactions..." autocomplete="off" />
        </div>
        <ul id="list" class="list"></ul>
        <div id="show-more-container" style="display: none; text-align: center; margin-top: -20px; margin-bottom: 40px;">
            <button id="show-more-btn" class="btn btn-ghost" style="width: auto; padding: 8px 24px; font-size: 0.75rem;">Show More</button>
        </div>
        <div class="space-management">
            <h3>Space Management</h3>
            <div class="space-actions">
                <button class="btn btn-ghost" id="edit-space-btn">Edit Space Name</button>
                <button class="btn btn-danger-ghost" id="delete-space-btn">Delete This Space</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-icon-btn" id="settings-btn" title="Settings">⚙️</button>
        <div class="spaces-container" id="spaces-list">
            <!-- Spaces will be injected here -->
        </div>
        <button class="nav-btn" id="select-space-trigger" title="Select Tracking Space" style="display: none;">Switch Space</button>
        <button class="add-space-btn" id="add-space-btn" title="Add Tracking Space">+</button>
    </nav>

    <!-- Modal Overlay -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h3>New Tracking Space</h3>
            <form id="space-form">
                <div class="form-control">
                    <label for="space-name">Space Name</label>
                    <input type="text" id="space-name" placeholder="e.g., Business, Savings..." required />
                </div>
                <div class="form-control">
                    <label for="space-desc">Description (Optional)</label>
                    <input type="text" id="space-desc" placeholder="What is this space for?" />
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-ghost" id="close-modal">Cancel</button>
                    <button type="submit" class="btn">Create Space</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-overlay">
        <div class="modal">
            <h3>Settings</h3>
            <form id="settings-form">
                <div class="form-control">
                    <label for="currency-select">Currency</label>
                    <select id="currency-select">
                        <option value="USD">USD ($)</option>
                        <option value="EUR">EUR (€)</option>
                        <option value="GBP">GBP (£)</option>
                        <option value="JPY">JPY (¥)</option>
                        <option value="INR">INR (₹)</option>
                    </select>
                </div>
                <div class="form-control">
                    <label for="theme-select">Theme</label>
                    <select id="theme-select">
                        <option value="dark">Dark Mode</option>
                        <option value="light">Light Mode</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-danger" id="clear-data">Clear All Data</button>
                    <button type="submit" class="btn">Save Settings</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Add Transaction Modal -->
    <div class="modal-overlay" id="add-transaction-overlay">
        <div class="modal">
            <h3>Record Transaction</h3>
            <form id="form">
                <div style="display: flex; gap: 12px;">
                    <div class="form-control" style="flex: 2;">
                        <label for="text">Label</label>
                        <input type="text" id="text" placeholder="Optional description..." />
                    </div>
                    <div class="form-control" style="flex: 1;">
                        <label for="category">Category</label>
                        <select id="category">
                            <option value="Revenue">Revenue</option>
                            <option value="Food & Dining">Food & Dining</option>
                            <option value="Groceries">Groceries</option>
                            <option value="Transport">Transport</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Health">Health & Wellness</option>
                            <option value="Travel">Travel</option>
                            <option value="Utilities">Utilities</option>
                            <option value="Subscriptions">Subscriptions</option>
                            <option value="Equity">Equity/Investment</option>
                            <option value="Payroll">Payroll & Benefits</option>
                            <option value="Marketing">Marketing & Growth</option>
                            <option value="Software">Software & SaaS</option>
                            <option value="Legal">Legal & Compliance</option>
                            <option value="Logistics">Logistics & Supply</option>
                            <option value="Operations">Operations</option>
                            <option value="Real Estate">Real Estate/Rent</option>
                            <option value="Consulting">Consulting</option>
                            <option value="Taxes">Taxes</option>
                            <option value="Lifestyle">Lifestyle</option>
                        </select>
                    </div>
                </div>
                
                <div class="amount-selector expense-active" id="amount-selector">
                    <div class="segmented-control">
                        <button type="button" class="segment-btn active" id="btn-expense">Expense</button>
                        <button type="button" class="segment-btn" id="btn-income">Income</button>
                    </div>
                    <div class="massive-amount-wrapper">
                        <span id="amount-currency-symbol">$</span>
                        <input type="number" step="0.01" id="amount" placeholder="0.00" required />
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn btn-ghost" id="close-add-modal">Cancel</button>
                    <button type="submit" class="btn">Add Transaction</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Transaction Modal -->
    <div class="modal-overlay" id="edit-transaction-overlay">
        <div class="modal">
            <h3>Transaction Details</h3>
            <form id="edit-form">
                <div style="display: flex; gap: 12px;">
                    <div class="form-control" style="flex: 2;">
                        <label for="edit-text">Description</label>
                        <input type="text" id="edit-text" />
                    </div>
                    <div class="form-control" style="flex: 1;">
                        <label for="edit-category">Category</label>
                        <select id="edit-category">
                            <option value="Revenue">Revenue</option>
                            <option value="Food & Dining">Food & Dining</option>
                            <option value="Groceries">Groceries</option>
                            <option value="Transport">Transport</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Health">Health & Wellness</option>
                            <option value="Travel">Travel</option>
                            <option value="Utilities">Utilities</option>
                            <option value="Subscriptions">Subscriptions</option>
                            <option value="Equity">Equity/Investment</option>
                            <option value="Payroll">Payroll & Benefits</option>
                            <option value="Marketing">Marketing & Growth</option>
                            <option value="Software">Software & SaaS</option>
                            <option value="Legal">Legal & Compliance</option>
                            <option value="Logistics">Logistics & Supply</option>
                            <option value="Operations">Operations</option>
                            <option value="Real Estate">Real Estate/Rent</option>
                            <option value="Consulting">Consulting</option>
                            <option value="Taxes">Taxes</option>
                            <option value="Lifestyle">Lifestyle</option>
                        </select>
                    </div>
                </div>
                
                <div class="amount-selector" id="edit-amount-selector">
                    <div class="segmented-control">
                        <button type="button" class="segment-btn" id="edit-btn-expense">Expense</button>
                        <button type="button" class="segment-btn" id="edit-btn-income">Income</button>
                    </div>
                    <div class="massive-amount-wrapper">
                        <span class="edit-currency-symbol">$</span>
                        <input type="number" step="0.01" id="edit-amount" placeholder="0.00" required />
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn btn-danger-ghost" id="edit-delete-btn">Delete</button>
                    <div style="flex: 1; display: flex; gap: 12px; justify-content: flex-end;">
                        <button type="button" class="btn btn-ghost" id="close-edit-modal">Cancel</button>
                        <button type="submit" class="btn">Save Changes</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Select Space Modal -->
    <div class="modal-overlay" id="select-space-overlay">
        <div class="modal">
            <h3>Select Tracking Space</h3>
            <div class="space-selection-list" id="modal-spaces-list">
                <!-- Spaces will be injected here -->
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-ghost" id="close-select-space-modal">Close</button>
            </div>
        </div>
    </div>

    <!-- Inter-Space Transfer Modal (Stepped Wizard) -->
    <div class="modal-overlay" id="transfer-overlay">
        <div class="modal">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="margin: 0; text-transform: none; font-size: 1.1rem;">Transfer Funds</h3>
                <span id="step-indicator" style="font-size: 0.7rem; color: var(--text-muted); font-weight: 700;">STEP 1/3</span>
            </div>

            <!-- Step 1: Select Target Space -->
            <div class="transfer-step active" id="transfer-step-1">
                <label>Select Destination/Source Space</label>
                <div class="space-selection-list" id="transfer-space-list">
                    <!-- Spaces injected via JS -->
                </div>
            </div>

            <!-- Step 2: Direction & Amount -->
            <div class="transfer-step" id="transfer-step-2">
                <div class="form-control" style="margin-bottom: 30px;">
                    <label id="transfer-out-label">Send to Space</label>
                    <div class="massive-amount-wrapper transfer-out-wrapper">
                        <span class="edit-currency-symbol">$</span>
                        <input type="number" step="0.01" id="transfer-amount-out" placeholder="0.00" style="font-size: 2.2rem;" />
                    </div>
                </div>
                <div class="form-control">
                    <label id="transfer-in-label">Receive from Space (optional)</label>
                    <div class="massive-amount-wrapper transfer-in-wrapper">
                        <span class="edit-currency-symbol">$</span>
                        <input type="number" step="0.01" id="transfer-amount-in" placeholder="0.00" style="font-size: 2.2rem;" />
                    </div>
                </div>
            </div>

            <!-- Step 3: Details -->
            <div class="transfer-step" id="transfer-step-3">
                <div class="form-control">
                    <label>Transfer Description</label>
                    <input type="text" id="transfer-text" placeholder="e.g., Internal Reallocation" />
                </div>
                <div class="form-control">
                    <label>Category</label>
                    <select id="transfer-category">
                        <option value="Equity">Equity/Investment</option>
                        <option value="Operations">Operations</option>
                        <option value="Logistics">Logistics & Supply</option>
                        <option value="Revenue">Revenue</option>
                        <option value="Lifestyle">Lifestyle</option>
                    </select>
                </div>
            </div>

            <div class="modal-actions">
                <button type="button" class="btn btn-ghost" id="transfer-back-btn" style="display: none;">Back</button>
                <button type="button" class="btn btn-ghost" id="close-transfer-modal">Cancel</button>
                <button type="button" class="btn" id="transfer-next-btn">Next Step</button>
            </div>
        </div>
    </div>

    <!-- Full History Modal -->
    <div class="modal-overlay" id="history-overlay">
        <div class="modal" style="max-width: 450px;">
            <h3>Full Ledger</h3>
            <div style="max-height: 450px; overflow-y: auto; margin: 20px -10px; padding: 0 10px;">
                <ul id="full-history-list" class="list" style="margin-bottom: 0;"></ul>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-ghost" id="close-history-modal" style="width: 100%;">Close Ledger</button>
            </div>
            <div style="margin-top: 15px; border-top: 1px solid var(--border-color); padding-top: 15px;">
                <span class="metric-label" style="display: block; margin-bottom: 10px;">Export Data</span>
                <div style="display: flex; gap: 8px;">
                    <button class="btn btn-ghost" style="flex: 1; font-size: 0.7rem; padding: 10px;" onclick="exportData('csv')">Export CSV</button>
                    <button class="btn btn-ghost" style="flex: 1; font-size: 0.7rem; padding: 10px;" onclick="exportData('json')">Export JSON</button>
                </div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
